# ─────────────────────────────────────────────────────────────────────────────────────────────
# Configuration DÉCLARATIVE de la passerelle (mode headless / GitOps).
#
# Ce fichier n'est lu QUE si la variable d'environnement GATEWAY_CONFIG pointe dessus (c'est ce
# que fait `docker-compose.headless.yml` / `runProdHeadless`). En mode UI classique, il est ignoré.
#
# Au démarrage, l'état de la base (serveurs d'exécution, cibles publiques, clés API) est aligné
# sur ce fichier — l'équivalent versionné de la console d'admin.
#
# SECRETS : n'écrivez JAMAIS un secret en clair ici. Utilisez `${NOM_DE_VARIABLE}` : la valeur est
# interpolée depuis l'environnement (.env.prod) au chargement. Le fichier reste ainsi commitable.
#
# Copiez ce fichier en `gateway.yaml`, adaptez-le, puis `./runProdHeadless`.
# ─────────────────────────────────────────────────────────────────────────────────────────────

# Élagage des clés retirées de ce fichier :
#   false (défaut) → la clé est DÉSACTIVÉE (accès révoqué, mais conservée en base).
#   true           → la clé est SUPPRIMÉE définitivement.
# Les clés créées par l'UI (hors de ce fichier) ne sont JAMAIS touchées.
prune: false

# Configuration SMTP — requise seulement si une clé a un canal de livraison « email ». Les secrets
# (identifiants) s'écrivent ${NOM}. En dev : Inbucket (host inbucket, port 2500, tls none).
smtp:
  host: ${SMTP_HOST}
  port: 587
  tls: starttls              # none | starttls | tls
  username: ${SMTP_USER}
  password: ${SMTP_PASSWORD}
  from: gateway@exemple.com

# Serveurs d'exécution (upstreams Ollama). `models` fixe une liste STATIQUE (aucune sonde requise,
# utile en environnement fermé). `token` (facultatif) = jeton d'auth d'un amont distant, chiffré
# au repos ; référencez-le par ${NOM}. Un seul serveur peut porter `default: true`.
servers:
  - name: local
    base_url: http://127.0.0.1:11434
    default: true
    models: [llama3:8b, qwen3:4b]
  - name: gpu-distant
    base_url: https://gpu.interne.exemple:11434
    token: ${GPU_UPSTREAM_TOKEN}      # défini dans .env.prod, jamais en clair ici
    models: [llama3:70b]

# Cibles publiques : l'URL que le client met dans OLLAMA_HOST / OPENAI_BASE_URL / ANTHROPIC_BASE_URL.
# Sert à générer les variables d'environnement livrées avec la clé (ne change pas le routage).
targets:
  - name: publique
    base_url: https://passerelle.exemple:8443
    default: true

# Clés API. `name` = identité STABLE (external_ref) : la réconciliation reconnaît une clé déjà
# créée et met seulement sa config à jour, sans la recréer.
#   value:  (facultatif) importe une clé au secret CONNU (${NOM} depuis l'env), retrouvable côté
#           client. Absent → une clé est GÉNÉRÉE ; son secret (affiché une seule fois) est LIVRÉ
#           via les canaux `deliver` — sans canal, il est irrécupérable.
#   server/target: référencent un `name` défini ci-dessus (absent → défaut).
#   deliver: canaux de livraison du secret d'une clé GÉNÉRÉE (ignoré si `value` est fourni). Jetons
#           de template webhook : #OllamaKey (secret), #OllamaUrl (URL publique), #OllamaLabel.
keys:
  - name: client-acme
    value: ${ACME_KEY}                # clé connue importée (retrouvable côté client)
    label: Client ACME (prod)
    server: gpu-distant
    target: publique
    origins: [203.0.113.0/24]         # IP/CIDR autorisés (vide = toutes origines)
    models: [llama3:70b]              # allowlist de modèles (vide = tous ceux du serveur)
    apis: [ollama, openai]           # familles d'API autorisées (vide = toutes)
    rpm_limit: 60                     # requêtes/min
    monthly_token_cap: 100000000      # plafond mensuel de tokens

  - name: essai-interne
    server: local
    rpm_limit: 20
    total_token_cap: 5000000          # budget de VIE (essai à coût plafonné)
    expires_at: "2027-01-01 00:00:00"
    deliver:                          # clé générée → secret poussé vers ces canaux, une seule fois
      - email: { to: equipe@exemple.com }
      - webhook:                      # preset : slack | discord | generic (ou `template:` libre)
          url: ${SLACK_WEBHOOK_URL}
          preset: slack
