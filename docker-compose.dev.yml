# DEV — self-contained & self-seeded : faux upstream Ollama + proxy + admin, SQLite jeté à chaque
# run (runDev fait `down -v`). Aucun service externe, aucun GPU. E2E frappe proxy:8787 et admin:8788.
name: ollama-gateway-dev

services:
  fake-ollama:
    build: .
    image: ollama-gateway:dev
    entrypoint: []
    command: uvicorn devfixtures.fake_ollama:app --host 0.0.0.0 --port 11434
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://127.0.0.1:11434/')"]
      interval: 3s
      timeout: 3s
      retries: 10

  proxy:
    build: .
    image: ollama-gateway:dev
    environment:
      APP_ENV: dev
      GATEWAY_ROLE: proxy
      OLLAMA_UPSTREAM: http://fake-ollama:11434
      PROXY_HOST: 0.0.0.0
      PROXY_PORT: "8787"
      GATEWAY_DB_PATH: /data/gateway.db
      TRUSTED_PROXY_IPS: 127.0.0.1,::1
      ADMIN_PASSWORD: adminpass
    volumes:
      - gw_data:/data
    ports:
      - "8787:8787"
    depends_on:
      fake-ollama:
        condition: service_healthy

  admin:
    build: .
    image: ollama-gateway:dev
    environment:
      APP_ENV: dev
      GATEWAY_ROLE: admin
      ADMIN_HOST: 0.0.0.0
      ADMIN_PORT: "8788"
      GATEWAY_DB_PATH: /data/gateway.db
      ADMIN_SESSION_SECRET: dev-insecure-session-secret
      ADMIN_PASSWORD: adminpass
    volumes:
      - gw_data:/data
    ports:
      - "8788:8788"

volumes:
  gw_data:
