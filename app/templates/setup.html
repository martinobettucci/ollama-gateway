{% extends "base.html" %}
{% block title %}Initialisation — Passerelle Ollama{% endblock %}
{% block body %}
<h1>Première utilisation — définir le mot de passe admin</h1>
<div class="panel" style="max-width:420px">
  {% if error %}<p class="err">{{ error }}</p>{% endif %}
  <form method="post" action="/admin/setup">
    <label for="password">Mot de passe admin (min. 8 caractères)</label>
    <input id="password" name="password" type="password" autocomplete="new-password" required>
    <label for="confirm">Confirmation</label>
    <input id="confirm" name="confirm" type="password" autocomplete="new-password" required>
    <p style="margin-top:1rem"><button type="submit">Définir et entrer</button></p>
  </form>
</div>
{% endblock %}
