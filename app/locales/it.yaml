tgt:
  title: Destinazioni pubbliche
  intro: Una <strong>destinazione</strong> è l'URL pubblico del gateway così come lo vede un client (es. <span class="mono">https://llm.example:21434</span>). Serve a generare le variabili d'ambiente della chiave associata — <strong>non modifica il routing</strong> (l'upstream resta scelto dal server di esecuzione). Ogni chiave punta a una destinazione; la destinazione predefinita non è eliminabile.
  keys_count: '{count} chiave/i'
  edit:
    name: Nome
    url: URL pubblico
  delete_confirm: Eliminare la destinazione «{name}»?
  add:
    title: Aggiungi una destinazione
    name: Nome *
    url: URL pubblico *
    hint: Senza slash finale. È l'URL che il client inserirà in <span class="mono">OLLAMA_HOST</span> / <span class="mono">OPENAI_BASE_URL</span> / <span class="mono">ANTHROPIC_BASE_URL</span>.
    submit: Aggiungi la destinazione
