tgt:
  title: Openbare bestemmingen
  intro: Een <strong>bestemming</strong> is de openbare URL van de gateway zoals een client die ziet (bijv. <span class="mono">https://llm.example:8443</span>). Ze dient om de omgevingsvariabelen van de gekoppelde sleutel te genereren — <strong>ze wijzigt de routering niet</strong> (de upstream wordt nog steeds door de uitvoeringsserver gekozen). Elke sleutel wijst naar een bestemming; de standaardbestemming kan niet worden verwijderd.
  keys_count: '{count} sleutel(s)'
  edit:
    name: Naam
