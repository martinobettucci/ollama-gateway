tgt:
  title: Cibles publiques
  intro: Une <strong>cible</strong> est l'URL publique de la passerelle telle que la voit un client (ex. <span class="mono">https://llm.example:21434</span>). Elle sert à générer les variables d'environnement de la clé rattachée — <strong>elle ne change pas le routage</strong> (l'amont reste choisi par le serveur d'exécution). Chaque clé pointe vers une cible ; la cible par défaut est indélébile.
  keys_count: '{count} clé(s)'
  edit:
    name: Nom
    url: URL publique
  delete_confirm: Supprimer la cible « {name} » ?
  add:
    title: Ajouter une cible
    name: Nom *
    url: URL publique *
    hint: Sans slash final. C'est l'URL que le client mettra dans <span class="mono">OLLAMA_HOST</span> / <span class="mono">OPENAI_BASE_URL</span> / <span class="mono">ANTHROPIC_BASE_URL</span>.
    submit: Ajouter la cible
