    url: Öffentliche URL *
    hint: Ohne abschließenden Schrägstrich. Dies ist die URL, die der Client in <span class="mono">OLLAMA_HOST</span> / <span class="mono">OPENAI_BASE_URL</span> / <span class="mono">ANTHROPIC_BASE_URL</span> einträgt.
    submit: Ziel hinzufügen
