tgt:
  title: Öffentliche Ziele
  intro: Ein <strong>Ziel</strong> ist die öffentliche URL des Gateways, wie ein Client sie sieht (z. B. <span class="mono">https://llm.example:8443</span>). Es dient zum Erzeugen der Umgebungsvariablen des zugeordneten Schlüssels — <strong>es ändert nicht das Routing</strong> (das Upstream wird weiterhin vom Ausführungsserver gewählt). Jeder Schlüssel verweist auf ein Ziel; das Standardziel ist unlöschbar.
  keys_count: '{count} Schlüssel'
  edit:
    name: Name
    url: Öffentliche URL
  delete_confirm: Ziel „{name}“ löschen?
  add:
    title: Ziel hinzufügen
