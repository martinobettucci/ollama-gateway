tgt:
  title: Destinos públicos
  intro: Um <strong>destino</strong> é o URL público do gateway tal como um cliente o vê (ex. <span class="mono">https://llm.example:8443</span>). Serve para gerar as variáveis de ambiente da chave associada — <strong>não altera o encaminhamento</strong> (o upstream continua a ser escolhido pelo servidor de execução). Cada chave aponta para um destino; o destino predefinido não pode ser eliminado.
  keys_count: '{count} chave(s)'
  edit:
    name: Nome
    url: URL público
  delete_confirm: Eliminar o destino «{name}»?
  add:
    title: Adicionar um destino
    name: Nome *
    url: URL público *
    hint: Sem barra final. É o URL que o cliente colocará em <span class="mono">OLLAMA_HOST</span> / <span class="mono">OPENAI_BASE_URL</span> / <span class="mono">ANTHROPIC_BASE_URL</span>.
    submit: Adicionar o destino
