tgt:
  title: Destinos públicos
  intro: Un <strong>destino</strong> es la URL pública de la puerta de enlace tal como la ve un cliente (p. ej. <span class="mono">https://llm.example:21434</span>). Sirve para generar las variables de entorno de la clave asociada — <strong>no cambia el enrutamiento</strong> (el upstream lo sigue eligiendo el servidor de ejecución). Cada clave apunta a un destino; el destino predeterminado no se puede eliminar.
  keys_count: '{count} clave(s)'
  edit:
    name: Nombre
    url: URL pública
  delete_confirm: ¿Eliminar el destino «{name}»?
  add:
    title: Añadir un destino
    name: Nombre *
    url: URL pública *
    hint: Sin barra final. Es la URL que el cliente pondrá en <span class="mono">OLLAMA_HOST</span> / <span class="mono">OPENAI_BASE_URL</span> / <span class="mono">ANTHROPIC_BASE_URL</span>.
    submit: Añadir el destino
