tgt:
  title: Public targets
  intro: A <strong>target</strong> is the gateway's public URL as a client sees it (e.g. <span class="mono">https://llm.example:21434</span>). It is used to generate the environment variables of the attached key — <strong>it does not change routing</strong> (the upstream is still chosen by the execution server). Each key points to a target; the default target cannot be deleted.
  keys_count: '{count} key(s)'
  edit:
    name: Name
    url: Public URL
  delete_confirm: Delete target “{name}”?
  add:
    title: Add a target
    name: Name *
    url: Public URL *
    hint: No trailing slash. This is the URL the client will put in <span class="mono">OLLAMA_HOST</span> / <span class="mono">OPENAI_BASE_URL</span> / <span class="mono">ANTHROPIC_BASE_URL</span>.
    submit: Add the target
